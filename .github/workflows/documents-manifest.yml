name: Обновить список документов

on:
  push:
    branches: [main]
    paths:
      - "documents/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Сгенерировать documents/manifest.json
        run: node scripts/generate-manifest.js

      - name: Закоммитить manifest.json (если изменился)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documents/manifest.json
          if git diff --cached --quiet; then
            echo "Изменений нет"
          else
            git commit -m "auto: обновить список документов"
            git push
          fi
